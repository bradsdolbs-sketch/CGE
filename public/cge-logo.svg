<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark background -->
  <rect width="200" height="200" rx="16" fill="#1a1a1a"/>

  <!-- CGE monogram — editorial serif italic -->
  <text
    x="100"
    y="132"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="112"
