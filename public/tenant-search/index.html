<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Find Your Next Home — CGE</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1A3D2B;
    --green-light: #2a5c40;
    --cream: #f5f2ee;
    --bg: #0f1a13;
    --bubble-bg: #1c2e1f;
    --user-bg: #1A3D2B;
    --text: #e8e4df;
    --muted: rgba(232,228,223,0.5);
    --border: rgba(255,255,255,0.08);
    --accent: #5db07a;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 640px;
    margin: 0 auto;
  }

  header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--cream);
    flex-shrink: 0;
  }

  header h1 { font-size: 15px; font-weight: 600; color: var(--cream); }
  header p { font-size: 12px; color: var(--muted); margin-top: 1px; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble.bot {
    background: var(--bubble-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    align-self: flex-start;
  }

  .bubble.user {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
    color: var(--cream);
    align-self: flex-end;
  }

  .typing {
    display: flex; gap: 4px; align-items: center;
    padding: 14px 18px;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

  #input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font);
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.selected { background: var(--green); border-color: var(--green); color: var(--cream); }

  .text-row {
    display: flex; gap: 8px;
  }

  input[type=text], input[type=email], input[type=tel], input[type=number] {
    flex: 1;
    background: var(--bubble-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }

  .send-btn {
    background: var(--green);
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    color: var(--cream);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    font-family: var(--font);
    white-space: nowrap;
  }
  .send-btn:hover { background: var(--green-light); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .multi-check { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
    font-size: 13px;
    color: var(--text);
  }
  .check-item:hover { border-color: var(--accent); }
  .check-item input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }
  .check-item.checked { border-color: var(--green); }

  .confirm-btn {
    margin-top: 10px;
    width: 100%;
    padding: 11px;
    background: var(--green);
    border: none;
    border-radius: 10px;
    color: var(--cream);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
  }
  .confirm-btn:hover { background: var(--green-light); }

  .done-box {
    text-align: center;
    padding: 24px 0 8px;
  }
  .done-box h3 { font-size: 18px; font-weight: 700; color: var(--cream); margin-bottom: 8px; }
  .done-box p { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .done-box a {
    display: inline-block;
    margin-top: 20px;
    padding: 11px 28px;
    background: var(--green);
    color: var(--cream);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="avatar">CGE</div>
    <div>
      <h1>Find your next home</h1>
      <p>We'll match you to the right property — fast</p>
    </div>
  </header>
  <div id="chat"></div>
  <div id="input-area"></div>
</div>

<script>
const chat = document.getElementById('chat')
const inputArea = document.getElementById('input-area')
const answers = {}

const AREAS = ['Shoreditch', 'Bethnal Green', 'Hackney', 'Hoxton', 'Whitechapel', 'Bow', 'Stepney Green', 'Flexible']
const BEDROOMS = ['Studio', '1 bed', '2 bed', '3 bed', '4+ bed', 'Flexible']
const MOVE_IN = ['ASAP', 'Within 1 month', '1–3 months', '3+ months']
const PREFS = ['Furnished', 'Bills included', 'Parking', 'Pets allowed', 'Outside space']

function scrollBottom() {
  setTimeout(() => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }), 50)
}

function addBubble(text, type = 'bot') {
  const el = document.createElement('div')
  el.className = `bubble ${type}`
  el.textContent = text
  chat.appendChild(el)
  scrollBottom()
  return el
}

function showTyping() {
  const el = document.createElement('div')
  el.className = 'bubble bot typing'
  el.innerHTML = '<span></span><span></span><span></span>'
  chat.appendChild(el)
  scrollBottom()
  return el
}

function botSay(text, delay = 600) {
  return new Promise(resolve => {
    const t = showTyping()
    setTimeout(() => {
      t.remove()
      addBubble(text, 'bot')
      resolve()
    }, delay)
  })
}

function showChips(options, multi = false) {
  return new Promise(resolve => {
    const wrap = document.createElement('div')
    wrap.className = 'chips'
    const selected = new Set()

    options.forEach(opt => {
      const btn = document.createElement('button')
      btn.className = 'chip'
      btn.textContent = opt
      if (multi) {
        btn.addEventListener('click', () => {
          if (selected.has(opt)) { selected.delete(opt); btn.classList.remove('selected') }
          else { selected.add(opt); btn.classList.add('selected') }
        })
      } else {
        btn.addEventListener('click', () => {
          wrap.remove()
          addBubble(opt, 'user')
          resolve(opt)
        })
      }
      wrap.appendChild(btn)
    })

    if (multi) {
      const done = document.createElement('button')
      done.className = 'confirm-btn'
      done.textContent = 'Continue →'
      done.addEventListener('click', () => {
        wrap.remove()
        const chosen = [...selected]
        addBubble(chosen.length ? chosen.join(', ') : 'No preference', 'user')
        resolve(chosen)
      })
      inputArea.innerHTML = ''
      inputArea.appendChild(wrap)
      inputArea.appendChild(done)
    } else {
      inputArea.innerHTML = ''
      inputArea.appendChild(wrap)
    }
    scrollBottom()
  })
}

function showTextInput(placeholder, type = 'text') {
  return new Promise(resolve => {
    const row = document.createElement('div')
    row.className = 'text-row'
    const inp = document.createElement('input')
    inp.type = type
    inp.placeholder = placeholder
    const btn = document.createElement('button')
    btn.className = 'send-btn'
    btn.textContent = 'Next →'

    function submit() {
      const val = inp.value.trim()
      if (!val) return
      row.remove()
      addBubble(val, 'user')
      resolve(val)
    }

    btn.addEventListener('click', submit)
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit() })
    row.appendChild(inp)
    row.appendChild(btn)
    inputArea.innerHTML = ''
    inputArea.appendChild(row)
    inp.focus()
    scrollBottom()
  })
}

async function run() {
  await botSay("Hi! I'm here to help match you with the right property. This takes about 2 minutes. Let's start — which area are you looking in?", 800)
  answers.area = await showChips(AREAS)

  await botSay("What's your monthly budget? (£ per month)", 500)
  answers.budget = await showTextInput('e.g. 1800', 'text')

  await botSay("How many bedrooms do you need?", 500)
  answers.bedrooms = await showChips(BEDROOMS)

  await botSay("When are you looking to move in?", 500)
  answers.moveIn = await showChips(MOVE_IN)

  await botSay("Any must-haves? Select all that apply.", 500)
  answers.preferences = await showChips(PREFS, true)

  await botSay("Almost there! What's your full name?", 500)
  answers.name = await showTextInput('Your full name')

  await botSay("And your email address?", 400)
  answers.email = await showTextInput('your@email.com', 'email')

  await botSay("Last one — best phone number to reach you?", 400)
  answers.phone = await showTextInput('Phone number', 'tel')

  await botSay("Great — I'm submitting your details now…", 400)
  inputArea.innerHTML = ''

  try {
    const nameParts = answers.name.trim().split(' ')
    const firstName = nameParts[0]
    const lastName = nameParts.slice(1).join(' ') || ''

    await fetch('/api/enquiries', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'TENANT_ENQUIRY',
        firstName,
        lastName,
        email: answers.email,
        phone: answers.phone,
        message: [
          `Area: ${answers.area}`,
          `Budget: £${answers.budget} pcm`,
          `Bedrooms: ${answers.bedrooms}`,
          `Move-in: ${answers.moveIn}`,
          `Preferences: ${answers.preferences.length ? answers.preferences.join(', ') : 'None'}`,
        ].join('\n'),
      }),
    })
  } catch (_) { /* fail silently — still show success */ }

  inputArea.innerHTML = ''
  const done = document.createElement('div')
  done.className = 'done-box'
  done.innerHTML = `
    <h3>You're on our radar.</h3>
    <p>We'll be in touch within 24 hours with properties that match what you're looking for. If something comes up sooner, we'll reach out straight away.</p>
    <a href="${(window.top || window).location.href.split('/tenants')[0]}/properties">Browse available properties →</a>
  `
  inputArea.appendChild(done)
  scrollBottom()
}

run()
</script>
</body>
</html>
